# KQL Query Taxonomy
# ------------------
# Defines how queries are classified into topics.
#
# Classification order (first match wins):
#   1. folder_contains  — any path component of the source file contains this string (case-insensitive)
#   2. filename_contains — the filename contains this keyword (case-insensitive)
#
# Default topic for unmatched files: "various"

topics:

  identity:
    label: "Identity & Authentication"
    folder_contains:
      - "Azure Active Directory"
      - "Defender For Identity"
      - "Entra ID"
      - "Graph API"
    filename_contains:
      - "Identity"
      - "Entra"
      - "Passkey"
      - "FIDO"
      - "Conditional Access"
      - "ConditionalAccess"
      - "OAuth"
      - "Sign.*In"
      - "SignIn"
      - "MFA"
      - "PIM"
      - "Global Admin"
      - "AiTM"
      - "Phishing"          # AiTM phishing is identity-focused
      - "ATO"
      - "Password"
      - "Authentication"
      - "Authenticator"
      - "Device Code"
      - "Guest User"
      - "BadSuccessor"

  endpoint:
    label: "Endpoint & Device Security"
    folder_contains:
      - "Defender For Endpoint"
      - "SecurityEvents"
    filename_contains:
      - "Ransomware"
      - "USB"
      - "Living Off The Land"
      - "ASR"
      - "SmartScreen"
      - "Endpoint"
      - "ClickFix"
      - "Dropper"
      - "RAT"
      - "Malware"
      - "Process"
      - "Chrome extension"

  email:
    label: "Email & Office 365"
    folder_contains:
      - "Office 365"
      - "Defender for Office365"
    filename_contains:
      - "Phish"
      - "Email"
      - "Mail"
      - "AppSheet"
      - "Spam"
      - "Brands Impersonation"

  cloud:
    label: "Cloud Infrastructure (Azure)"
    folder_contains:
      - "Azure/Arc"
      - "Azure/Compute"
      - "Cloud Audit Events"
      - "Data Lake"
      - "ADX"
      - "Log Analytics"
    filename_contains:
      - "Blob"
      - "Storage"
      - "regreSSHion"
      - "OpenSSH"
      - "AWS"
      - "Arc Machine"
      - "Azure CLI"
      - "Azure Resource"
      - "Azure Storage"
      - "Azure Cloud"
      - "Azure API"
      - "Azure Outdated"
      - "Commvault"

  vulnerabilities:
    label: "Vulnerabilities & Patch Management"
    folder_contains:
      - "Vulnerability Management"
      - "Vulnerability Exploitation"
      - "MDVM"
      - "Exposure Management"
    filename_contains:
